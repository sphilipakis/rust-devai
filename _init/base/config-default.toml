# >>> DO NOT EDIT THIS FILE <<<

# IMPORTANT: THIS FILE UPDATES WITH EACH AIPACK UPDATE
# To customize AIPACK, edit `./config-user.toml` to add or override values.
# `config-default.toml` loads first, and `config-user.toml` merges on top to create the global configuration. This can be overridden by the workspace `.aipack/config.toml` and agent-specific options.

[options]

# `model` is required.
# Fallback if not defined in `./config-user.toml` or workspace-level `config.toml`.
# Supported providers: OpenAI, Gemini, Anthropic, Ollama, xAI, Cohere, DeepSeek, Fireworks.Ai, Nebius, Groq, Together.ai.
# For OpenAI/Gemini, use `-low`, `-medium`, `-high` for reasoning budgets.
# AIPACK detects the provider, or defaults to local Ollama.
# Specify with namespacing, e.g., `fireworks::kimi-k2-instruct`.

model = "gpt-5.4-mini"

# Temperature (unset by default)
# temperature = 0.0

# Concurrency (defaults to 2)
input_concurrency = 2

# Model Aliases
# Update in `./config-user.toml`.
# Use simple names with `_` and `-`.
# If an alias contains `.` or special characters, use double quotes.

[options.model_aliases]
# -- Anthropic
mythos        = "claude-mythos-5"
fable         = "claude-fable-5"
opus          = "claude-opus-4-8"
claude        = "claude-sonnet-4-6"
sonnet        = "claude-sonnet-4-6"
haiku         = "claude-haiku-4-5"
# -- OpenAI
gpt           = "gpt-5.5"
mini          = "gpt-5.4-mini"
nano          = "gpt-5.4-nano"
codex         = "gpt-5.5"
# -- Google
gpro          = "gemini-3.1-pro-preview"
flash         = "gemini-3.5-flash"
lite          = "gemini-3.1-flash-lite"
flash3        = "gemini-3-flash-preview" # older than flash 3.5, but 3x cheaper
# -- DeepSeek
dflash        = "deepseek-v4-flash"
dpro          = "deepseek-v4-pro"
# -- z.ai
glm           = "zai::glm-5.2"
# -- kimi
kimi          = "kimi::kimi-k2.7-code"
kimi-fast     = "kimi::kimi-k2.7-code-highspeed"
# -- minimax
minimax       = "MiniMax-M3"
minimax-speed = "MiniMax-M2.7-highspeed"
# -- mimo
mimo          = "mimo::mimo-v2.5"
mimo-pro      = "mimo::mimo-v2.5-pro"
mflash        = "mimo::mimo-v2.5"
mpro          = "mimo::mimo-v2.5-pro"
# -- Fireworks models (namespaced with `fireworks::`)
f-kimi          = "fireworks::kimi-k2p7-code"
f-qwen          = "fireworks::qwen3p7-plus"
f-minimax       = "fireworks::minimax-m3"
f-glm           = "fireworks::glm-5p2"
f-glm-air       = "fireworks::glm-4p5-air"
f-gpt-oss       = "fireworks::gpt-oss-120b"
f-gpt-oss-120b  = "fireworks::gpt-oss-120b"
f-gpt-oss-20b   = "fireworks::gpt-oss-20b"
f-dflash        = "fireworks::deepseek-v4-flash"
f-dpro          = "fireworks::deepseek-v4-pro"